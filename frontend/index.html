<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>墨香雅筑 | 2026 现代图书推荐系统</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: 'Noto Sans SC', sans-serif;
        background-color: #fdfcf8;
        color: #1a1a1a;
      }

      .serif {
        font-family: 'Noto Serif SC', serif;
      }

      .glass-nav {
        background: rgba(253, 252, 248, 0.8);
        backdrop-filter: blur(12px);
        border-bottom: 1px solid rgba(0, 0, 0, 0.05);
      }

      .book-card:hover {
        transform: translateY(-8px) scale(1.02);
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
      }

      .custom-scroll::-webkit-scrollbar {
        height: 4px;
      }

      .custom-scroll::-webkit-scrollbar-thumb {
        background: #e5e7eb;
        border-radius: 10px;
      }

      .dynamic-gradient {
        background: linear-gradient(135deg, #fdfcf8 0%, #f3f4f6 100%);
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script src="https://code.iconify.design/3/3.1.1/iconify.min.js"></script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
